<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#223B52" />
      <stop offset="100%" stop-color="#1A2E40" />
    </radialGradient>
  </defs>

  <rect width="500" height="500" fill="url(#bgGlow)" rx="24"/>

  <!-- Thicker Base Shadow -->
  <polygon points="170,330 250,370 330,330 250,290" fill="rgba(0, 0, 0, 0.4)"/>

  <!-- Bottom switch body - MUCH thicker strokes (stroke-width="7") -->
  <polygon points="170,260 250,300 250,350 170,310" fill="#152533" stroke="#D4AF37" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="250,300 330,260 330,310 250,350" fill="#1E354A" stroke="#D4AF37" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="250,220 330,260 250,300 170,260" fill="#1A2E40" stroke="#D4AF37" stroke-width="7" stroke-linejoin="round"/>

  <!-- Simplified and larger gold stem (stroke-width="4" added for high contrast at low res) -->
  <polygon points="230,238 250,248 250,272 230,262" fill="#B08D27" stroke="#90701F" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="250,248 270,238 270,262 250,272" fill="#8C701F" stroke="#90701F" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="250,228 270,238 250,248 230,238" fill="#D4AF37" stroke="#90701F" stroke-width="3" stroke-linejoin="round"/>

  <!-- Dashed lines removed entirely as they turn to grey noise at 32px -->

  <!-- Upper floating cap - MUCH thicker strokes (stroke-width="7") and higher fill opacity for readability -->
  <polygon points="250,115 300,140 250,165 200,140" fill="rgba(212, 175, 55, 0.25)" stroke="#D4AF37" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="200,140 250,165 250,215 180,180" fill="rgba(26, 46, 64, 0.85)" stroke="#D4AF37" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="250,165 300,140 320,180 250,215" fill="rgba(26, 46, 64, 0.6)" stroke="#D4AF37" stroke-width="7" stroke-linejoin="round"/>

  <!-- Sound waves - Thicker curves (stroke-width="8") -->
  <path d="M 345,170 Q 375,200 345,230" fill="none" stroke="#D4AF37" stroke-width="8" stroke-linecap="round"/>
  <path d="M 365,150 Q 405,200 365,250" fill="none" stroke="#D4AF37" stroke-width="8" stroke-linecap="round"/>
</svg>
